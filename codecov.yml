codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 70%
        threshold: 5%
        only_pulls: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
